<html>
    <head>
        {% if night %}
        <title>NerdyMap - Night Schedule</title>
        {% else %}
        <title>NerdyMap</title>
        {% endif %}
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        >
        <link rel="stylesheet" type="text/css" href="static/css/style.css" />
        <script>
            const STATIONS = JSON.parse({{ stations | safe }});
            const RAILROAD_STATIONS = JSON.parse({{ railroad_stations | safe }});
        </script>
        <script type="module" src="static/js/index.js"></script>
        <script>
            // prettier-ignore
            (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
                key: "{{api_key}}"
            });
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <gmp-map center="40.735932643521714, -73.94962373756917" zoom="12" map-id="{{ map_key }}">
            <div id="controls" slot="control-inline-start-block-start">
                {% if night %}
                <h3>NerdyMap - Night Schedule</h3>
                {% else %}
                <h3>NerdyMap</h3>
                {% endif %}
            </div>

            <div id="alerts-dashboard"slot="control-inline-end-block-start">
                <div class="alerts-header">
                    <h3>Alerts</h3>
                    <button id="alerts-close" type="button">×</button>
                </div>
                <p id="alerts-status">Loading alerts...</p>
                <div id="alerts-list"></div>
            </div>
            <button id="alerts-open"slot="control-inline-end-block-start" type="button">
                Show Alerts
            </button>

        </gmp-map>
    </body>
        <script>
            async function loadAlerts() {
                const alertsList = document.getElementById("alerts-list");
                const alertsStatus = document.getElementById("alerts-status");

                alertsStatus.textContent = "Loading alerts...";
                alertsList.innerHTML = "";

                try {
                    const response = await fetch("/api/alerts");

                    if (!response.ok) {
                        throw new Error("The alerts couldn't be fetched (probably a mta error)");
                    }

                    const alerts = await response.json();

                    if (!alerts.length) {
                        alertsStatus.textContent = "No active alerts right now";
                        return;
                    }

                    alertsStatus.textContent = `${alerts.length} active alert(s)`;

                    alerts.forEach(alert => {
                        const card = document.createElement("div");
                        card.className = "alert-card";
                        const routeIcons = alert.routes
                            .map(route => `<img src="${route.icon}" alt="${route.name}" class="route-icon">`)
                            .join("");

                        card.innerHTML = `
                        <button class="alert-dropdown-button" type="button">
                            <span class="alert-dropdown-left">
                                <span class="alert-type">${alert.type}</span>
                                <span class="alert-routes">
                                    ${routeIcons || '<span class="no-route">No route listed</span>'}
                                </span>
                            </span>
                            <span class="alert-card-arrow">▶</span>
                        </button>

                        <div class="alert-dropdown-content collapsed">
                            <h4>${alert.title}</h4>

                            <p class="alert-description">${alert.description}</p>

                            <p class="alert-meta">
                                ${alert.route_count} route(s) affected · ${alert.stop_count} stop(s) affected
                            </p>
                        </div>
                    `;

                        alertsList.appendChild(card);

                        const button = card.querySelector(".alert-dropdown-button");
                        const content = card.querySelector(".alert-dropdown-content");
                        const arrow = card.querySelector(".alert-card-arrow");

                        button.addEventListener("click", () => {
                            content.classList.toggle("collapsed");
                            arrow.textContent = content.classList.contains("collapsed") ? "▶" : "▼";
                        });
                    });
                } catch (error) {
                    console.error(error);
                    alertsStatus.textContent = "Couldn't load the alerts";
                }
            }
            loadAlerts();
        </script>
        <script>
            const alertsDashboard = document.getElementById("alerts-dashboard");
            const alertsClose = document.getElementById("alerts-close");
            const alertsOpen = document.getElementById("alerts-open");
            function isMobile() {
                return window.innerWidth <= 900;
            }
            function openAlerts() {
                alertsDashboard.style.display = "block";
                alertsOpen.style.display = "none";

                if (isMobile()) {
                    requestAnimationFrame(() => {
                        alertsDashboard.classList.add("open");
                    });
                }
            }
            function closeAlerts() {
                if (isMobile()) {
                    alertsDashboard.classList.remove("open");

                    setTimeout(() => {
                        alertsDashboard.style.display = "none";
                        alertsOpen.style.display = "block";
                    }, 280);
                } else {
                    alertsDashboard.style.display = "none";
                    alertsOpen.style.display = "block";
                }
            }
            function setupAlertsLayout() {
                if (isMobile()) {
                    alertsDashboard.style.display = "none";
                    alertsDashboard.classList.remove("open");
                    alertsOpen.style.display = "block";
                } else {
                    alertsDashboard.style.display = "block";
                    alertsDashboard.classList.remove("open");
                    alertsOpen.style.display = "none";
                }
            }

            alertsClose.addEventListener("click", closeAlerts);
            alertsOpen.addEventListener("click", openAlerts);
            window.addEventListener("resize", setupAlertsLayout);

            setupAlertsLayout();
        </script>
</html>
